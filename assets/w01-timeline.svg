<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 940 300' width='940' height='300'>
<rect width='940' height='300' fill='#fff'/>
<line x1='60' y1='160' x2='900' y2='160' stroke='#1c1f26' stroke-width='3'/>
<polygon points='900,160 888,154 888,166' fill='#1c1f26'/>
<circle cx='150' cy='160' r='7' fill='#1c1f26'/>
<text x='150' y='114' font-family='DejaVu Sans Mono, monospace' font-size='15' font-weight='600' text-anchor='middle' fill='#1c1f26'>Aristotle</text>
<text x='150' y='134' font-family='DejaVu Sans Mono, monospace' font-size='12' text-anchor='middle' fill='#666'>~350 BC</text>
<text x='150' y='188' font-family='DejaVu Sans Mono, monospace' font-size='11' text-anchor='middle' fill='#1c1f26'>Formal deductive</text>
<text x='150' y='204' font-family='DejaVu Sans Mono, monospace' font-size='11' text-anchor='middle' fill='#1c1f26'>logic (syllogisms)</text>
<circle cx='380' cy='160' r='7' fill='#1c1f26'/>
<text x='380' y='114' font-family='DejaVu Sans Mono, monospace' font-size='15' font-weight='600' text-anchor='middle' fill='#1c1f26'>George Boole</text>
<text x='380' y='134' font-family='DejaVu Sans Mono, monospace' font-size='12' text-anchor='middle' fill='#666'>1854</text>
<text x='380' y='188' font-family='DejaVu Sans Mono, monospace' font-size='11' text-anchor='middle' fill='#1c1f26'>Algebra of logic:</text>
<text x='380' y='204' font-family='DejaVu Sans Mono, monospace' font-size='11' text-anchor='middle' fill='#1c1f26'>0 and 1 variables</text>
<circle cx='610' cy='160' r='7' fill='#1c1f26'/>
<text x='610' y='114' font-family='DejaVu Sans Mono, monospace' font-size='15' font-weight='600' text-anchor='middle' fill='#1c1f26'>Claude Shannon</text>
<text x='610' y='134' font-family='DejaVu Sans Mono, monospace' font-size='12' text-anchor='middle' fill='#666'>1937</text>
<text x='610' y='188' font-family='DejaVu Sans Mono, monospace' font-size='11' text-anchor='middle' fill='#1c1f26'>Boolean algebra =</text>
<text x='610' y='204' font-family='DejaVu Sans Mono, monospace' font-size='11' text-anchor='middle' fill='#1c1f26'>switching circuits</text>
<circle cx='820' cy='160' r='7' fill='#1c1f26'/>
<text x='820' y='114' font-family='DejaVu Sans Mono, monospace' font-size='15' font-weight='600' text-anchor='middle' fill='#1c1f26'>Cahit Arf</text>
<text x='820' y='134' font-family='DejaVu Sans Mono, monospace' font-size='12' text-anchor='middle' fill='#666'>1958</text>
<text x='820' y='188' font-family='DejaVu Sans Mono, monospace' font-size='11' text-anchor='middle' fill='#1c1f26'>'Can a machine</text>
<text x='820' y='204' font-family='DejaVu Sans Mono, monospace' font-size='11' text-anchor='middle' fill='#1c1f26'>think?'</text>
</svg>